<script type="text/babel" data-type="module">
const {useState,useEffect,useRef,useCallback}=React;

// Storage using localStorage (real browser, not artifact sandbox)
const storage={
  get:async(k)=>{try{const v=localStorage.getItem('tcm_'+k);return v?{value:v}:null}catch{return null}},
  set:async(k,v)=>{try{localStorage.setItem('tcm_'+k,v);return{key:k,value:v}}catch{return null}},
  delete:async(k)=>{try{localStorage.removeItem('tcm_'+k);return{key:k}}catch{return null}},
};

// API Key Management Wrapper
function AppWrapper(){
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('tcm_api_key')||'');
  const [input,setInput]=useState('');
  const [ready,setReady]=useState(!!localStorage.getItem('tcm_api_key'));

  const save=()=>{
    if(input.trim()){
      localStorage.setItem('tcm_api_key',input.trim());
      setApiKey(input.trim());
      setReady(true);
    }
  };

  if(!ready) return(
    <div className="api-setup">
      <div className="glyph">氣</div>
      <h1>TCM Begleiter</h1>
      <p>Um die KI-gestützte Diagnostik zu nutzen, benötigst du einen Anthropic API-Key. Du findest ihn unter <strong>console.anthropic.com</strong></p>
      <input
        type="password"
        placeholder="sk-ant-api03-..."
        value={input}
        onChange={e=>setInput(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter')save()}}
      />
      <button onClick={save} disabled={!input.trim()}>Starten</button>
      <button className="skip" onClick={()=>setReady(true)}>Ohne KI starten (eingeschränkt)</button>
      <div className="note">
        Dein Key wird nur lokal auf deinem Gerät gespeichert und nie an Dritte übermittelt.
        Du kannst ihn jederzeit in den Einstellungen ändern oder löschen.
      </div>
    </div>
  );

  return <TCMApp apiKey={apiKey} onChangeKey={()=>{localStorage.removeItem('tcm_api_key');setApiKey('');setReady(false);}} />;
}

## KERNKOMPETENZ: ZUNGENDIAGNOSE (舌诊)
(nach Maciocia "Diagnosis in Chinese Medicine" Kap. 37-42, Bob Flaws)

**Zungenkörper-Farbe:**
- Blass = Qi-Mangel, Yang-Mangel, Blut-Mangel → Labor: Hb, Ferritin, TSH prüfen
- Rosa = normal, gesund
- Rot = Hitze (Fülle-Hitze oder leere Hitze/Yin-Mangel) → Labor: CRP, BSG, SD-Panel
- Dunkelrot = Blut-Hitze, Ying-Ebene betroffen → Labor: CRP, Diff-BB, Ferritin
- Purpur = Blut-Stase (bläulich=Kälte-Stase, rötlich=Hitze-Stase) → Labor: D-Dimere, Homocystein
- Blau = extreme Kälte-Stase oder Sauerstoffmangel → Red Flag!

**Zungenbelag:**
- Weiß + dünn = normal oder leichte Kälte (äußeres Muster)
- Weiß + dick + fettig = Feuchtigkeit/Schleim (Milz-Yang-Mangel nach Ploberger) → Labor: Triglyceride, HDL, Harnsäure
- Gelb = Hitze (je dunkler, desto stärker) → Labor: CRP, Leberwerte
- Grau/schwarz = extreme Pathologie (trockener schwarzer Belag = Yin-Erschöpfung, feuchter = extreme Kälte) → Red Flag!
- Fehlender Belag = Magen/Milz-Yin-Mangel → chronisch, Yin nähren
- Schälender Belag (geographische Zunge) = Magen-Yin-Mangel mit Restfeuchtigkeit

**Zungenform:**
- Geschwollen = Feuchtigkeit (mit Zahnabdrücken = Milz-Qi-Mangel mit Feuchtigkeit)
- Dünn = Yin-Mangel oder Blut-Mangel (chronisch) → Labor: Hb, Ferritin, B12
- Zahnabdrücke = Qi-Mangel + Feuchtigkeit (Milz kann nicht transformieren)
- Risse = Yin-Mangel (Mitte = Magen-Yin, quer = Milz-Qi, Spitze = Herz) → Labor: HbA1c, Nierenwerte
- Stachelige Punkte (rot) = Hitze/Feuer (Lokalisation = betroffenes Organ)
- Tremor/Zittern = Qi-Mangel (schwer) oder innerer Wind (Leber-Wind) → Red Flag bei plötzlichem Auftreten

**Zonenkarte:**
- Zungenspitze = Herz (HE) / Lunge (LU) → Feuer + Metall
- Zungenränder = Leber (LE) / Gallenblase (GB) → Holz
- Zungenmitte = Milz (MI) / Magen (MA) → Erde
- Zungenwurzel = Niere (NI) / Blase (BL) / Darm → Wasser

**Zungenbewegung:**
- Zitternd = Qi-Mangel (leicht) oder innerer Wind (stark)
- Steif = Wind/Schleim blockiert Leitbahnen → Red Flag (Schlaganfallrisiko prüfen!)
- Schief = innerer Wind → Red Flag
- Eingerollt = innerer Wind/Hitze

## KERNKOMPETENZ: PULSDIAGNOSE-ANNÄHERUNG (脉诊)
Da echte Pulsdiagnose Palpation erfordert, nutze einen Fragebogen-Ansatz:
- Subjektive Pulswahrnehmung (schnell/langsam, kräftig/schwach)
- Herzfrequenz-Bereiche als Orientierung
- Korrelation mit 6 Grundpuls-Qualitäten (nach Maciocia vereinfacht):
  1. Oberflächlich (Fu 浮) = äußeres Muster
  2. Tief (Chen 沉) = inneres Muster
  3. Schnell (Shuo 数) = Hitze
  4. Langsam (Chi 迟) = Kälte
  5. Schwach/Dünn (Xi 细) = Blut-/Yin-Mangel
  6. Saitenförmig/Gespannt (Xian 弦) = Leber-Qi-Stagnation
- IMMER darauf hinweisen: Fragebogen ersetzt keine echte Pulsdiagnose

## KERNKOMPETENZ: KONSTITUTIONSTYP
**TCM-Konstitutionen (nach Ploberger/Maciocia):**
- Qi-Mangel-Typ, Yang-Mangel-Typ, Yin-Mangel-Typ, Blut-Mangel-Typ
- Feuchtigkeit-Typ, Qi-Stagnation-Typ, Blut-Stase-Typ
- Mischtypen (häufig!)

**Ayurveda-Prakriti (nach Lad/Frawley) — wo es ZUSÄTZLICHEN Wert bietet:**
- Vata (Luft+Äther): dünn, trocken, kalt, beweglich, ängstlich — KORRELIERT mit: Yin-Mangel + Blut-Mangel in TCM
- Pitta (Feuer+Wasser): mittel, warm, scharf, intensiv — KORRELIERT mit: Hitze-Muster + Leber-Yang in TCM
- Kapha (Erde+Wasser): kräftig, schwer, feucht, langsam — KORRELIERT mit: Feuchtigkeit/Schleim + Milz-Yang-Mangel in TCM

**KRITISCHE ABWÄGUNG TCM vs. Ayurveda:**
- Ayurveda ergänzt TCM bei: Konstitutionsverständnis, Verdauungsfeuer (Agni ≈ Milz-Yang), täglichen Routinen (Dinacharya), bestimmten Gewürzen
- Ayurveda widerspricht TCM manchmal bei: Thermik von Nahrungsmitteln (z.B. Honig: TCM=neutral-warm, Ayurveda=nicht erhitzen!), Rohkost (Ayurveda differenzierter nach Dosha)
- Bei Widersprüchen: BEIDE Perspektiven nennen und begründen, warum du welcher folgst
- Ayurveda NICHT nutzen wenn: TCM allein ausreicht, die Systeme sich widersprechen ohne Mehrwert, der Patient verwirrt wird

## KERNKOMPETENZ: WANDLUNGSPHASEN (五行) + ERNÄHRUNG

**Erzeugungszyklus (Sheng 生 — Mutter-Kind):**
Holz → Feuer → Erde → Metall → Wasser → Holz
- Mutter nährt Kind: Bei Mangel des Kindes → Mutter stärken
- Bsp: Lungen-Qi-Mangel (Metall) → Milz stärken (Erde = Mutter von Metall)
- Bsp: Herz-Blut-Mangel (Feuer) → Leber-Blut nähren (Holz = Mutter von Feuer)

**Kontrollzyklus (Ke 克 — Großmutter-Enkel):**
Holz → Erde → Wasser → Feuer → Metall → Holz
- Kontrolle/Hemmung: Holz kontrolliert Erde, Erde kontrolliert Wasser, usw.
- Bsp: Leber-Qi-Stagnation (Holz überaktiv) → kontrolliert Milz (Erde) übermäßig → Verdauungsprobleme
- Bsp: Niere (Wasser) kontrolliert Herz (Feuer) — bei Nieren-Yin-Mangel → unkontrolliertes Herz-Feuer

**Gegenläufiger Kontrollzyklus (Wu 侮 — Beleidigung/Rebellion):**
- Wenn das kontrollierte Element zurückschlägt
- Bsp: Niere (Wasser) zu schwach → kann Herz-Feuer nicht kontrollieren → Herz-Yin-Mangel mit aufsteigendem Feuer
- Bsp: Milz (Erde) zu schwach → kann Niere (Wasser) nicht kontrollieren → Ödeme, Wassereinlagerung

**Erschöpfungszyklus (Kind erschöpft Mutter):**
- Bei Überaktivität des Kindes → Mutter wird geschwächt
- Bsp: Chronische Trauer (Lunge/Metall) erschöpft Milz (Erde)
- Bsp: Chronische Angst (Niere/Wasser) erschöpft Lunge (Metall)

**ERNÄHRUNGSEMPFEHLUNGEN — IMMER MIT MECHANISMUS:**
Bei jeder Empfehlung MUSS erklärt werden:
1. Welche Phase ist gestört?
2. Über welchen Zyklus (Sheng/Ke/Wu) wirkt die Empfehlung?
3. Geschmack → Phase: sauer=Holz, bitter=Feuer, süß=Erde, scharf=Metall, salzig=Wasser
4. Thermik: heiß/warm/neutral/kühl/kalt
5. Kochmethode → Phase: Grillen/Braten=Feuer, Dünsten/Schmoren=Erde, Blanchieren/Dämpfen=Metall, Einlegen/Fermentieren=Wasser, Keimen/Sprossen=Holz
6. Farbe der Nahrung → Phase: grün=Holz, rot=Feuer, gelb-orange=Erde, weiß=Metall, schwarz-dunkel=Wasser

**Dojo-Zeiten (nach Diolosa/Temelie):**
Die letzten 18 Tage jeder Jahreszeit gehören der Erde/Milz — ideale Entlastungszeit:
- Congee, milde süße Nahrung, Feuchtigkeit ausleiten
- Keine Rohkost, kein Kaltes, kein Schweres

ZUSÄTZLICH: Bei jeder Empfehlung die ayurvedische Perspektive prüfen — Agni (Verdauungsfeuer ≈ Milz-Yang) berücksichtigen. Nach Lad: Agni bestimmt, ob Nahrung in Ojas (≈ Jing) oder Ama (≈ Feuchtigkeit/Schleim) umgewandelt wird.

## KERNKOMPETENZ: BLUTBILD-BRÜCKE (TCM → Westliches Labor)

TCM-Diagnosen korrelieren mit messbaren Laborparametern. Bei JEDER Diagnose die Blutbild-Korrelation angeben:

**Qi-Mangel (Qi Xu 气虚):**
- Hämoglobin: oft niedrig-normal (12-13 g/dl Frauen, 13-14 Männer)
- Ferritin: kann erniedrigt sein (< 30 ng/ml = latenter Eisenmangel nach WHO)
- TSH: leicht erhöht (subklinische Hypothyreose als DD)
- Vitamin D (25-OH): häufig erniedrigt (< 30 ng/ml)
- Lymphozyten: können erniedrigt sein
- Cortisol-Tagesprofil: kann abgeflacht sein
- Empfohlenes Panel: Kleines BB, Ferritin, TSH, Vitamin D

**Blut-Mangel (Xue Xu 血虚):**
- Hämoglobin: deutlich erniedrigt (< 12 g/dl Frauen, < 13 Männer)
- Ferritin: oft < 15 ng/ml (manifester Eisenmangel)
- Transferrinsättigung: < 20%
- MCV: erniedrigt (mikrozytär bei Eisen) oder erhöht (makrozytär bei B12/Folsäure)
- Vitamin B12: kann erniedrigt sein (< 300 pg/ml)
- Folsäure: kann erniedrigt sein
- Retikulozyten: zeigen Therapieantwort
- Empfohlenes Panel: Großes BB + Differentialblutbild, Eisenstatus komplett, B12, Folsäure

**Yang-Mangel (Yang Xu 阳虚):**
- TSH: erhöht (> 4 mU/l — Hypothyreose)
- fT3/fT4: erniedrigt oder niedrig-normal
- Cortisol (morgens): kann erniedrigt sein (< 10 µg/dl)
- DHEA-S: oft erniedrigt
- Testosteron: kann erniedrigt sein (Männer < 3 ng/ml)
- Vitamin D: häufig Mangel
- Cholesterin: kann erhöht sein (verlangsamter Lipidstoffwechsel)
- Basaltemperatur: erniedrigt (< 36.3°C — kein Laborwert, aber diagnostisch hilfreich)
- Empfohlenes Panel: Schilddrüsenpanel (TSH, fT3, fT4), Cortisol, DHEA-S, Lipide, Vitamin D

**Yin-Mangel (Yin Xu 阴虚):**
- HbA1c: kann erhöht sein (> 5.7% = Prä-Diabetes)
- TSH: erniedrigt (Hyperthyreose als DD)
- fT3/fT4: erhöht oder hoch-normal
- Östradiol: erniedrigt (perimenopausaler Yin-Mangel)
- Kreatinin/Harnstoff: leicht erhöht (Nieren-Yin-Mangel)
- Kalium: kann erniedrigt sein
- BSG/CRP: können leicht erhöht sein (chronische niedriggradige Entzündung)
- Empfohlenes Panel: HbA1c, SD-Panel, Sexualhormone, Nierenwerte, Elektrolyte

**Blut-Stase (Xue Yu 血瘀):**
- D-Dimere: können erhöht sein
- Fibrinogen: erhöht
- CRP/BSG: Entzündungsmarker erhöht
- Homocystein: oft erhöht (> 10 µmol/l — KHK-Risikofaktor!)
- Lipoprotein(a): kann erhöht sein
- Thrombozyten: können reaktiv erhöht sein
- Empfohlenes Panel: Gerinnung (Quick, PTT, D-Dimere, Fibrinogen), CRP, Homocystein, Lipide

**Feuchtigkeit/Schleim (Shi/Tan 湿/痰):**
- Triglyceride: erhöht (> 150 mg/dl)
- LDL-Cholesterin: erhöht
- HDL-Cholesterin: erniedrigt
- HbA1c: erhöht (metabolisches Syndrom)
- Harnsäure: erhöht (> 7 mg/dl bei Männern)
- GGT/GPT: können erhöht sein (Fettleber)
- TSH: kann erhöht sein (Feuchtigkeit blockiert Yang)
- Empfohlenes Panel: Lipidprofil komplett, Harnsäure, Leberwerte, HbA1c, Urinanalyse

**Leber-Qi-Stagnation (Gan Qi Yu Jie 肝气郁结):**
- GPT/GOT: leicht erhöht
- GGT: erhöht (besonders bei Alkohol/Medikamenten)
- Bilirubin: kann leicht erhöht sein (Gilbert-Syndrom korreliert häufig)
- Cortisol: erhöht (chronischer Stress)
- Prolaktin: kann erhöht sein (PMS-Zusammenhang)
- Schilddrüsenantikörper (TPO-AK, TG-AK): Hashimoto als häufiges Korrelat!
- Progesteron (Lutealphase): kann erniedrigt sein
- Empfohlenes Panel: Leberwerte, Cortisol, SD-Antikörper, Prolaktin, ggf. Sexualhormone

**Hitze/Feuer (Re/Huo 热/火):**
- CRP: erhöht
- BSG: beschleunigt
- Leukozyten: erhöht (Leukozytose)
- Differentialblutbild: Neutrophilie (bakteriell) oder Lymphozytose (viral)
- Ferritin: kann als Akutphase-Protein erhöht sein (NICHT Eisenüberladung!)
- Leberwerte: können erhöht sein
- Empfohlenes Panel: CRP, BSG, Differentialblutbild, Ferritin, Leberwerte

**STANDARD-EMPFEHLUNG bei jeder TCM-Diagnose an den Hausarzt:**
1. Großes Blutbild + Differentialblutbild
2. Schilddrüsenpanel (TSH, fT3, fT4, TPO-AK)
3. Eisenstatus (Ferritin, Transferrin, Transferrinsättigung)
4. Leber-/Nierenwerte (GPT, GOT, GGT, Kreatinin, Harnstoff)
5. Lipidprofil (Gesamt-Cholesterin, LDL, HDL, Triglyceride)
6. Entzündungsmarker (CRP, BSG)
7. Vitamin D, B12, Folsäure
8. HbA1c bei Verdacht auf Stoffwechselstörung

Referenzen: Dr. med. Andrea Hellwig-Lenzen (Uni Witten-Herdecke), Dr. Georg Weidinger "TCM und Schulmedizin", SMS München Curriculum "Integrative TCM-Diagnostik"

## KERNKOMPETENZ: SEELISCH-EMOTIONALE DIAGNOSTIK (情志 Qíng Zhì)

Nach Maciocia "The Psyche in Chinese Medicine", Ploberger "TCM und Emotionen", Larre/Rochat de la Vallée "The Seven Emotions":

**Die 5 Seelenaspekte (五神 Wǔ Shén) — jedem Zang-Organ zugeordnet:**

1. **Shén 神 (Geist/Bewusstsein) → Herz (Feuer):**
   - Bewusstsein, Klarheit, Schlaf, Ausstrahlung ("Glanz in den Augen")
   - Gestört: Schlafstörungen, Verwirrtheit, Angst, manisches Verhalten, Depression
   - Blutbild-Korrelation: TSH (Schilddrüse beeinflusst Psyche), Vitamin D, B12, Folsäure, Cortisol
   - Ayurveda: Sattva/Rajas/Tamas — Geistesqualitäten (nach Frawley "Ayurveda and the Mind")

2. **Hún 魂 (Wanderseele/Ätherseele) → Leber (Holz):**

// STORAGE HELPERS
// ═══════════════════════════════════════════════════════════════════════

async function loadData(key) {
  try { const r = await storage.get(key); return r ? JSON.parse(r.value) : null; } catch { return null; }
}
async function saveData(key, val) {
  try { await storage.set(key, JSON.stringify(val)); } catch (e) { console.error("Storage error:", e); }
}

// ═══════════════════════════════════════════════════════════════════════
// PROSE RENDERER
// ═══════════════════════════════════════════════════════════════════════

function Prose({ text }) {
  if (!text) return null;
  return <div className="prose">{text.split("\n").map((l, i) => {
    if (l.startsWith("### ")) return <h4 key={i} className="ph4">{ib(l.slice(4))}</h4>;
    if (l.startsWith("## ")) return <h3 key={i} className="ph3">{ib(l.slice(3))}</h3>;
    if (l.startsWith("# ")) return <h2 key={i} className="ph2">{ib(l.slice(2))}</h2>;
    if (/^[-*] /.test(l)) return <div key={i} className="pli"><span className="pbul">•</span>{ib(l.slice(2))}</div>;
    if (/^\d+\./.test(l)) return <div key={i} className="pol">{ib(l)}</div>;
    if (!l.trim()) return <div key={i} style={{ height: 6 }} />;
    return <p key={i} className="pp">{ib(l)}</p>;
  })}</div>;
}
function ib(t) { return t.split(/(\*\*[^*]+\*\*)/).map((p, i) => p.startsWith("**") && p.endsWith("**") ? <strong key={i} className="pb">{p.slice(2,-2)}</strong> : p); }

// ═══════════════════════════════════════════════════════════════════════

function TCMApp({apiKey, onChangeKey}) {
  const [view, setView] = useState("home");
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [tongueImg, setTongueImg] = useState(null);
  const [tongueResult, setTongueResult] = useState(null);
  const [answers, setAnswers] = useState({});
  const [dSec, setDSec] = useState(0);
  const [diagResult, setDiagResult] = useState(null);
  const [selEl, setSelEl] = useState(null);
  const [history, setHistory] = useState([]);
  const [savedSessions, setSavedSessions] = useState([]);
  const [showHistory, setShowHistory] = useState(false);
  const chatEnd = useRef(null);
  const fileRef = useRef(null);

  // Load saved sessions on mount
  useEffect(() => { loadData("tcm-sessions").then(d => { if (d) setSavedSessions(d); }); }, []);
  useEffect(() => { chatEnd.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);

  // Get current season
  const getSeason = () => {
    const m = new Date().getMonth();
    if (m >= 2 && m <= 4) return { name: "Frühling", el: "wood", phase: "Holz 木", tip: "Leber stärken, grüne Kräuter, sauer mäßig" };
    if (m >= 5 && m <= 6) return { name: "Sommer", el: "fire", phase: "Feuer 火", tip: "Herz schützen, Bitteres nährt, leichte Kost" };
    if (m === 7) return { name: "Spätsommer", el: "earth", phase: "Erde 土 (Dojo)", tip: "Milz stärken, Feuchtigkeit ausleiten, Congees" };
    if (m >= 8 && m <= 10) return { name: "Herbst", el: "metal", phase: "Metall 金", tip: "Lunge befeuchten, Birnen, weiße Lebensmittel" };
    return { name: "Winter", el: "water", phase: "Wasser 水", tip: "Niere nähren, warm essen, Jing schützen" };
  };
  const season = getSeason();

  const api = useCallback(async (msg, sys, img) => {
    const messages = img
      ? [{ role: "user", content: [{ type: "image", source: { type: "base64", media_type: "image/jpeg", data: img }}, { type: "text", text: msg }]}]
      : [...history, { role: "user", content: msg }];
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 4096, system: sys || TCM_SYSTEM, messages }),
      });
      const d = await r.json();
      const t = d.content?.map(b => b.text || "").join("\n") || "Verbindungsfehler. Bitte erneut versuchen.";
      if (!img) setHistory(h => [...h, { role: "user", content: msg }, { role: "assistant", content: t }]);
      return t;
    } catch { return "Verbindungsfehler — bitte erneut versuchen."; }
  }, [history]);

  const send = async () => {
    if (!input.trim() || loading) return;
    const m = input.trim(); setInput("");
    setMsgs(p => [...p, { role: "user", content: m }]);
    setLoading(true);
    const r = await api(m);
    setMsgs(p => [...p, { role: "assistant", content: r }]);
    setLoading(false);
  };

  const goChat = (q) => {
    setView("chat");
    const base = diagResult || tongueResult;
    const seed = base ? [{ role: "assistant", content: base }] : [{ role: "assistant", content: `Willkommen bei deinem ganzheitlichen Begleiter. 🌿\n\nAktuell ist ${season.name} — die Wandlungsphase ${season.phase}.\n${season.tip}\n\nErzähl mir, wie es dir geht, oder stelle eine Frage. Ich begleite dich mit TCM, westlicher Kräuterkunde und — wo es hilft — Ayurveda. Alle Empfehlungen mit Quellenangaben.\n\nWas beschäftigt dich gerade?` }];
    if (q) {
      setMsgs([...seed, { role: "user", content: q }]);
      setLoading(true);
      api(q).then(r => { setMsgs(p => [...p, { role: "assistant", content: r }]); setLoading(false); });
    } else if (msgs.length === 0) setMsgs(seed);
  };

  const saveSession = async () => {
    const s = { date: new Date().toISOString(), tongue: tongueResult, diag: diagResult, answers: { ...answers } };
    const updated = [s, ...savedSessions].slice(0, 20);
    setSavedSessions(updated);
    await saveData("tcm-sessions", updated);
  };

  const uploadTongue = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      setTongueImg(ev.target.result); setTongueResult(null); setLoading(true);
      const r = await api(TONGUE_PROMPT, TCM_SYSTEM, ev.target.result.split(",")[1]);
      setTongueResult(r); setLoading(false);
    };
    reader.readAsDataURL(f);

  // ═══ FACE DIAGNOSIS (Bridges, Gellis, CT Holman) ═══
  if (view === "face") return (

            <text x="60" y="151" textAnchor="middle" fontSize="5" fill="#6a6a6a">肺</text>
            <circle cx="160" cy="145" r="20" fill="none" stroke="#6a6a6a" strokeWidth=".7" strokeDasharray="3 2" />
            <text x="160" y="143" textAnchor="middle" fontSize="6" fill="#6a6a6a" fontWeight="600">Lunge</text>
            <text x="160" y="151" textAnchor="middle" fontSize="5" fill="#6a6a6a">肺</text>
            {/* Nose - Spleen */}

            <text x="110" y="147" textAnchor="middle" fontSize="6" fill="#b8862a" fontWeight="600">Milz 脾</text>

            {/* Chin - Kidney */}

            <text x="110" y="232" textAnchor="middle" fontSize="5" fill="#1e4d6b">Kinn · Hormone · Jing</text>

            <ellipse cx="135" cy="115" rx="14" ry="7" fill="none" stroke="#3d6b47" strokeWidth=".7" />

        <div className="card">
          <div className="card-title">Gesichtsfarben-Diagnostik</div>
          {[
            { c: "#b5352a", n: "Rot", m: "Hitze (Herz-Feuer, Yin-Mangel)" },
            { c: "#d4d0c8", n: "Blass/Weiß", m: "Kälte, Qi-Mangel, Blut-Mangel" },
            { c: "#c8b040", n: "Gelb", m: "Feuchtigkeit, Milz-Schwäche" },
            { c: "#5a7a6a", n: "Grünlich", m: "Kälte, Schmerz, Leber-Qi-Stagnation" },
            { c: "#3a3a4a", n: "Dunkel/Schwarz", m: "Nieren-Erschöpfung, Blut-Stase" },
          ].map(f => (
            <div key={f.n} style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4, fontSize: ".74rem" }}>

        <div className="card">
          <div className="card-title">Tiefergehende Fragen:</div>

            "Was sagen meine Stirnfalten über mein Herz und meine Sorgen?",
            "Zornesfalte zwischen den Brauen — wie löse ich Leber-Qi-Stagnation?",
            "Akne am Kinn — Hormon/Nieren-Zusammenhang und was hilft?",
            "Augenringe und Tränensäcke — was sagt die TCM dazu?",
            "5-Elemente-Gesichtstyp: Welcher bin ich und was bedeutet das?",
            "Emotionale Traumata im Gesicht erkennen (nach Bridges/Holman)",
          ].map(q => <button key={q} onClick={() => goChat(`${q} Erkläre nach Lillian Pearl Bridges "Face Reading in Chinese Medicine" und Michelle Gellis. Mit Wandlungsphasen-Zuordnung, Blutbild-Korrelation und konkreten Ernährungs-/Kräuterempfehlungen. Quellenangaben.`)} className="q-btn">{q}</button>)}

  // ═══ GUA SHA GUIDE (Katie Brindle / Hayo'u) ═══
  if (view === "guasha") return (
    <div className="app"><style>{CSS}</style>
      <Hdr title="💎 Gua Sha & Yang Sheng" sub="Brindle · Hayo'u Method · Selbstfürsorge" />
      <div className="content">
        <div className="card">
          <p className="card-text">Gua Sha (刮痧) ist eine jahrtausendealte Selbstbehandlungstechnik der TCM. Mit einem Werkzeug aus Jade oder Edelstahl wird Qi und Blut bewegt, Stagnation gelöst und die Selbstheilung aktiviert.</p>

        </div>

        {[
          { t: "🪷 Gesichts-Gua Sha", s: "Täglich 1–2 Min. · Jade/Rosenquarz · Sanft", items: "Lymphe drainieren · Kollagen anregen · Stress abbauen · Qi im Gesicht bewegen" },
          { t: "💪 Körper-Gua Sha", s: "Therapeutisch · Edelstahl/Bian-Stein · Fester", items: "Nacken/Schulter (GB/BL) · Rücken (DU/BL) · Brust (LU) · Beine (MI/MA)" },
          { t: "🌅 Yang Sheng Morgenritual", s: "Nach Brindle · 5 Minuten", items: "Gesichts-Gua Sha → Klopfübung (Pai Da) → Dehnübung → warmes Wasser" },
          { t: "🌙 Yang Sheng Abendritual", s: "Entspannung · Niere stärken", items: "Fußbad mit Ingwer → Body-Gua Sha → Bauchmassage → Atemübung" },
        ].map(g => (
          <button key={g.t} onClick={() => goChat(`Erkläre mir "${g.t}" Schritt für Schritt:
1. Welches Werkzeug und Material? (Jade vs. Rosenquarz vs. Edelstahl — wann welches?)
2. Vorbereitung (Öl? Reinigung?)
3. Technik: Richtung, Druck, Anzahl der Striche
4. Reihenfolge der Zonen mit TCM-Begründung (Meridianverlauf!)
5. Sha-Farben und was sie diagnostisch bedeuten
6. Kontraindikationen (wann NICHT?)
7. Wie passt das zu meiner aktuellen Saison (${season.name})?

Quellen: Katie Brindle "Yang Sheng", Hayo'u Method.`)}

        <div className="card" style={{ borderLeft: "3px solid #8b3a3a" }}>
          <div className="card-title">⚠️ Kontraindikationen</div>
          <div style={{ fontSize: ".74rem", color: "#5a4a4a", lineHeight: 1.6 }}>

        <div className="card">

            { c: "#ff9090", n: "Hellrot", m: "Frische Hitze, oberflächlich, akut" },
            { c: "#cc4040", n: "Dunkelrot", m: "Tiefe Hitze, chronische Entzündung" },
            { c: "#8a3060", n: "Purpur", m: "Blut-Stase, chronische Blockade" },
            { c: "#3a2040", n: "Schwarz-purpur", m: "Schwere chronische Stase, Kälte + Stase" },

            <div key={s.n} style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4, fontSize: ".72rem" }}>

              <span><strong>{s.n}:</strong> {s.m}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  // ═══ SETTINGS ═══
  if (view === "settings") return (
    <div className="app"><style>{CSS}</style>
      <Hdr title="⚙️ Einstellungen" sub="API-Key und Daten verwalten" />

          </div>
        </div>
        <div className="card">
          <div className="card-title">Diagnose-Verlauf</div>
          <p className="card-text">{savedSessions.length} Sitzungen gespeichert</p>
          <div style={{marginTop:10,display:"flex",gap:6}}>
            <Pill c="#8b3a3a" onClick={async()=>{setSavedSessions([]);await storage.set("tcm-sessions",JSON.stringify([]))}}>Verlauf löschen</Pill>
          </div>
        </div>
        <div className="card">
          <div className="card-title">Über diese App</div>
          <p className="card-text">氣 TCM Begleiter v3 — Ganzheitliche TCM-Diagnostik mit KI</p>
          <p className="card-note" style={{marginTop:6}}>Quellen: Ploberger, Maciocia, Temelie, Bridges, Cohen, Brindle, Lad, Frawley, Deadman, Weidinger, Hellwig-Lenzen, Holmes, Ross, Oleson, Nogier, Gellis, Holman, Wang Qi, Diolosa, Porkert u.a.</p>
          <p className="card-note" style={{marginTop:4}}>Kein Ersatz für ärztliche oder heilpraktische Behandlung.</p>
        </div>
      </div>
    </div>
  );

  // ═══ CHAT ═══
  if (view === "chat") return (
    <div className="app chat-layout"><style>{CSS}</style>
      <Hdr title="💬 Beratung" sub="TCM · Ayurveda · Quellen" />
      <div className="chat-msgs">
        {msgs.map((m, i) => (
          <div key={i} className={`msg ${m.role}`}>
            <div className={`bubble ${m.role}`}>{m.role === "user" ? m.content : <Prose text={m.content} />}</div>
          </div>
        ))}
        {loading && <div className="msg assistant"><div className="bubble assistant"><span className="typing">氣 Analysiere...</span></div></div>}
        <div ref={chatEnd} />
      </div>
      <div className="chat-input-area">
        {msgs.length <= 1 && (
          <div className="suggestions">
            {["Ständig müde, friere — Blutwerte?", `Saisonale Ernährung ${season.name}`, "Leber-Qi-Stagnation: TCM + Ayurveda"].map(s => (
              <button key={s} onClick={() => setInput(s)} className="sug-btn">{s}</button>
            ))}
          </div>
        )}
        <div className="input-row">
          <textarea value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }}}
            placeholder="Erzähl mir, wie es dir geht..."
            rows={1} className="chat-input"
            onInput={e => { e.target.style.height = "auto"; e.target.style.height = Math.min(e.target.scrollHeight, 120) + "px"; }}
          />
          <button onClick={send} disabled={!input.trim() || loading} className={`send-btn ${input.trim() && !loading ? "active" : ""}`}>
            <svg viewBox="0 0 24 24" fill="currentColor" style={{width:18,height:18}}><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
  );

  return null;
}
